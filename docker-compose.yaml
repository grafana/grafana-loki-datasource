services:
  loki:
    image: grafana/loki:3.7.3@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3100/ready || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  loki-loader:
    image: python:3.14-alpine@sha256:26730869004e2b9c4b9ad09cab8625e81d256d1ce97e72df5520e806b1709f92
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./tests/e2e/fixtures:/data:ro
    entrypoint:
      - sh
      - -c
      - |
        set -e
        python3 /data/load.py
        echo "Fixture data loaded successfully"
    restart: no

  grafana:
    depends_on:
      loki:
        condition: service_healthy
      loki-loader:
        condition: service_completed_successfully
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
