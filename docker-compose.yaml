services:
  loki:
    image: grafana/loki:3.4.2
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3100/ready || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  loki-loader:
    image: python:3.12-alpine
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./tests/e2e/fixtures:/data:ro
    entrypoint:
      - sh
      - -c
      - |
        set -e
        python3 /data/load.py
        echo "Fixture data loaded successfully"
    restart: no

  grafana:
    depends_on:
      loki:
        condition: service_healthy
      loki-loader:
        condition: service_completed_successfully
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      # The base compose file sets the unsigned-plugin allowlist to the directory
      # name (grafana-loki-datasource). The externalized plugin's id is `loki`, so
      # override it here or Grafana rejects the unsigned build and falls back to
      # the core plugin.
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: loki
    configs:
      # Run the externalized plugin in place of the core Loki plugin.
      # Without as_external=true, DuplicatePluginIDValidation (pkg/services/pluginsintegration/pipeline/steps.go)
      # drops the external plugin because the core one is already registered under id=loki.
      - source: grafana_custom_ini
        target: /etc/grafana/grafana.ini

configs:
  grafana_custom_ini:
    content: |
      [plugin.loki]
      as_external = true
