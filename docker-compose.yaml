services:
  loki:
    image: grafana/loki:3.4.2@sha256:58a6c186ce78ba04d58bfe2a927eff296ba733a430df09645d56cdc158f3ba08
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3100/ready || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  loki-loader:
    image: python:3.12-alpine@sha256:6d43704baacd1bfbe7c295d7f13079d5d8104ed33568873133f8fc69980419df
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./tests/e2e/fixtures:/data:ro
    entrypoint:
      - sh
      - -c
      - |
        set -e
        python3 /data/load.py
        echo "Fixture data loaded successfully"
    restart: no

  grafana:
    depends_on:
      loki:
        condition: service_healthy
      loki-loader:
        condition: service_completed_successfully
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
