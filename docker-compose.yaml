services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      # The plugin ID is "loki" (not "grafana-loki-datasource"), so the base
      # config's allowlist entry is wrong. Override it with the correct plugin ID.
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: loki
